<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢乐斗地主</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 连接/大厅界面 -->
        <div id="lobby-view" class="view active">
            <div class="lobby-container">
                <h1>🃏 欢乐斗地主</h1>
                <p class="subtitle">公平对战 · 无控牌 · 纯技巧</p>
                <div class="connect-section">
                    <input type="text" id="server-url" placeholder="服务器地址 ws://host:port/ws" value="ws://localhost:9999/ws">
                    <input type="text" id="player-name" placeholder="输入昵称" maxlength="8">
                    <button id="btn-connect" onclick="connect()">连接服务器</button>
                </div>
                <div id="lobby-actions" class="hidden">
                    <div class="online-info">在线人数: <span id="online-count">0</span></div>
                    <div class="lobby-buttons">
                        <button onclick="quickMatch()">⚡ 快速匹配</button>
                        <button onclick="createRoom()">🏠 创建房间</button>
                        <button onclick="showJoinRoom()">🚪 加入房间</button>
                    </div>
                    <div id="join-room-section" class="hidden">
                        <input type="text" id="room-code-input" placeholder="输入房间号" maxlength="6">
                        <button onclick="joinRoom()">加入</button>
                    </div>
                </div>
                <div id="status-msg" class="status-msg"></div>
            </div>
        </div>

        <!-- 房间等待界面 -->
        <div id="room-view" class="view">
            <div class="room-container">
                <div class="room-header">
                    <span>房间号: <strong id="room-code"></strong></span>
                    <button onclick="leaveRoom()" class="btn-small">退出房间</button>
                </div>
                <div class="room-players" id="room-players"></div>
                <button id="btn-ready" onclick="toggleReady()">准备</button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="game-view" class="view">
            <div class="game-container">
                <!-- 顶部: 对手2 (地主上家) -->
                <div class="player-area top">
                    <div class="player-info" id="player-top">
                        <span class="player-name" id="name-top">等待中</span>
                        <span class="card-count" id="count-top">0</span>
                    </div>
                    <div class="played-cards" id="played-top"></div>
                </div>

                <!-- 中间区域 -->
                <div class="middle-area">
                    <!-- 左侧: 对手1 (地主下家) -->
                    <div class="player-area left">
                        <div class="player-info" id="player-left">
                            <span class="player-name" id="name-left">等待中</span>
                            <span class="card-count" id="count-left">0</span>
                        </div>
                        <div class="played-cards" id="played-left"></div>
                    </div>

                    <!-- 中央信息区 -->
                    <div class="center-info">
                        <div id="game-info"></div>
                        <div id="bottom-cards" class="bottom-cards"></div>
                        <div id="multiplier" class="multiplier"></div>
                    </div>

                    <!-- 右侧: 占位 -->
                    <div class="player-area right"></div>
                </div>

                <!-- 底部: 自己 -->
                <div class="my-area">
                    <div class="played-cards" id="played-me"></div>
                    <div class="my-hand" id="my-hand"></div>
                    <div class="action-buttons" id="action-buttons"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
    <script src="js/proto.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
